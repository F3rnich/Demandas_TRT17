, "futuro": "SGP: Pretende-se alcançar o cumprimento dos itens listados ao lado com a completa implementação do Projeto de Gestão de Pessoas por Competências. Considerando que o projeto está em curso, ainda não foi possível realizar as etapas de revisão, caracterizadas pelos itens \"b\" e \"d\"."}, {"pagina": "4120. Definir, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores", "questao": "4122. Os perfis profissionais desejados para cada ocupação ou grupo de ocupações de colaboradores da organização estão definidos e documentados", "resposta": "Adota parcialmente", "atende": "a; c; e", "obs": "SGP: Realização do mapeamento das competências dos cargos e funções de natureza gerencial, avaliação das competências de seus ocupantes, elaboração de Planos de Desenvolvimento Individual (PDI) e de Programa de Desenvolvimento Gerencial (PDG). Resolução CSJT n.º 92/2012, que instituiu o Modelo de Gestão de Pessoas por Competências; e Resolução CSJT n.º 156/2015, que dispõe sobre a Continuidade da Implantação do Modelo de Gestão de Pessoas por Competências no âmbito da Justiça do Trabalho de 1.º e 2.º Graus. Ademais, PAe 961-38.2016.5.17.0500.", "futuro": "SGP: Pretende-se alcançar o cumprimento dos itens listados ao lado com a completa implementação do Projeto de Gestão de Pessoas por Competências. Considerando que o projeto está em curso, ainda não foi possível realizar as etapas de revisão, caracterizadas pelos itens \"b\" e \"d\"."}, {"pagina": "4120. Definir, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores", "questao": "4123. Há definição do quantitativo necessário de pessoal por unidade organizacional ou por processo de trabalho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; e", "obs": "SGP: Realização de estudos multifacetados (movimentação de pessoal, recursos, demandas internas), visando apurar o quantitativo de pessoal necessário para a área finalística e de Tecnologia da Informação. al, evidência pertinente ao item “a”. Para o item “d”. Tenciosa-se utilizar o Banco de Talentos como ferramenta auxiliadora. Muito embora o ATO PRESI/SGP 21/2019 tenha sido aprovado, a ferramenta ainda não foi posta em prática por falta de disponibilização e treinamento no módulo PROGECOM, sistema satélite ao SIGEP, de caráter nacional.", "futuro": "SGP: Pretende-se alcançar o cumprimento dos itens listados ao lado com a completa implementação do Projeto de Gestão de Pessoas por Competências e com a operacionalização do Banco de Talentos."}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4132. Os métodos e critérios das seleções externas (p.ex. dos concursos públicos; colaboradores requisitados em seleções externas) são definidos com base nos perfis profissionais desejados definidos na prática “4120. Definir adequadamente, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores”", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Os editais para concursos de servidores e estagiários levam em consideração os perfis profissionais desejados para a eleição das matérias cobradas. Resolução CSJT n.º 63/2010, Resolução CNJ n.º 219/2016 e Resolução CNJ n.º 211/2015. Resoluções Administrativas números 13, 129 e 142, todas de 2012, e alterações, posteriormente revogada pela Resolução Administrativa n.º 001/2018 e Atos TRT 17.ª PRESI n.ºs 31/2008 e 07/2009, referendados pela Resolução Administrativa n.º 31/2010", "futuro": ""}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4133. O número de vagas solicitadas para serem preenchidas nas seleções externas é estabelecido a partir do quantitativo necessário de pessoal por unidade organizacional ou por processo de trabalho, atualizado conforme a prática “4120. Definir adequadamente, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores”", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Controle de quadro de lotação, tabela de lotação autorizada, lotação paradigma, lotacionograma, claros de lotação, entre outros controles pertinentes. Resolução CSJT n.º 63/2010, Resolução CNJ n.º 219/2016 e Resolução CNJ n.º 211/2015. Resoluções Administrativas números 13, 129 e 142, todas de 2012, e alterações, posteriormente revogada pela Resolução Administrativa n.º 001/2018 e Atos TRT 17.ª SEREH/PRESI n.ºs 31/2008 e 07/2009, e também Resolução Administrativa n.º 31/2010.", "futuro": ""}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4134. A organização aloca os colaboradores com base na comparação entre os perfis profissionais apresentados por eles e os perfis profissionais desejados (documentados) pelas unidades organizacionais", "resposta": "Adota parcialmente", "atende": "a; b; c", "obs": "SGP: Via de regra, sempre quando há nomeação de novo servidor, a área de gestão de pessoas realiza análise curricular desse servidor e coteja as informações colhidas com as necessidades de pessoal das unidades organizacionais. Em se tratando de movimentações internas, a área de gestão de pessoas, quando instada, analisa o perfil dos colaboradores e as necessidades organizacionais. O banco de talentos, quando em operação, funcionará como mecanismo de transparência ativa, tal qual retradado no item “d”. ATO PRESI/SGP 21/2019 e RA 14/2015.", "futuro": "SGP: Estima-se que com a conclusão do Projeto de Gestão de Pessoas por Competências e a operacionalização do Banco de Talentos, este Regional possa atender de forma sistemática os itens listados ao lado. Atualmente, percebe-se um atendimento casuístico."}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4141. Há uma política, ou programa, de sucessão", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: A Política de sucessão está em vigor no âmbito do TRT17 e é regulamentada pelo Ato SGP/PRESI nº 12/2020. No bojo deste projeto também é desenvolvido o mapeamento da criticidade de todos os postos do trabalho do TRT17. O andamento do projeto pode ser consultado no PAe 0000039-55.2020.5.17.0500.", "futuro": ""}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4142. As ocupações críticas da organização estão identificadas", "resposta": "Adota parcialmente", "atende": "", "obs": "SGP: A Política de sucessão está em vigor no âmbito do TRT17 e é regulamentada pelo Ato SGP/PRESI nº 12/2020. No bojo deste projeto também é desenvolvido o mapeamento da criticidade de todos os postos do trabalho do TRT17. Como não alcançamos a integralidade dos postos, recomenda-se a marcação “adota parcialmente”. O andamento do projeto pode ser consultado no PAe 0000039-55.2020.5.17.0500.", "futuro": "SGP: Estima-se que até o final do primeiro semestre de 2022 a matriz de criticidade de todos os postos de trabalho do TRT17 esteja concluída."}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4143. Há plano de sucessão para as ocupações críticas", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: A Política de sucessão está em vigor no âmbito do TRT17 e é regulamentada pelo Ato SGP/PRESI nº 12/2020. No bojo deste projeto também é desenvolvido o mapeamento da criticidade de todos os postos do trabalho do TRT17. O andamento do projeto pode ser consultado no PAe 0000039-55.2020.5.17.0500.", "futuro": ""}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4144. A organização executa ações educacionais para assegurar a disponibilidade de sucessores qualificados para as ocupações críticas", "resposta": "Adota parcialmente", "atende": "a; b; c", "obs": "SGP: item “a”: por força do Ato PRESI/SGP n.º 12/2020, é responsabilidade do ocupante de posto de trabalho considerado crítico, indicar servidor para sucedê-lo em seus impedimentos legais ou vacâncias (art. 7º). Item “b”: Com a maturidade da Política de Sucessão, a Secretaria de Gestão de Pessoas irá aplicar ao sucessor indicado o mesmo procedimento avaliativo de gestão por competências utilizado para o ocupante do posto crítico, de modo a identificar as lacunas de competências do sucessor e inseri-lo no programa de capacitação decorrente do modelo (art. 9º). Item “c”: tal qual ocorre para as demais ações educacionais, há avaliação de reação, aprendizado e resultado (quando aplicável) para as ações educacionais voltadas aos sucessores.", "futuro": "SGP: Almeja-se promover o cumprimento de maneira completa a todos os itens listados ao lado com o desenvolvimento da Política de Sucessão, a qual encontra-se atualmente no curso de sua implementação no Tribunal."}, {"pagina": "4150. Desenvolver as competências dos colaboradores e dos gestores", "questao": "4151. As lacunas de competências dos colaboradores e gestores da organização são identificadas e documentadas", "resposta": "Adota em menor parte", "atende": "a; b", "obs": "SGP: A organização dispõe de relatório de lacunas de competências comuns a todos os colaboradores (produtividade e qualidade, capacidade de iniciativa, responsabilidade, disciplina, assiduidade e pontualidade). No que tange às lacunas de competências de liderança e gestão, há ciclos de autoavaliação dos gestores, tendo sido realizado o primeiro ciclo em 2018.", "futuro": "SGP: Considerando que o último ciclo de autoavaliação dos gestores foi realizado em 2018, estima-se que será possível melhorar o cumprimento desta questão com o desenvolvimento do Projeto de Gestão de Pessoas por Competências. Pretende-se realizar novos ciclos de avaliação de lacunas após o mapeamento dos postos de trabalho deste Regional."}, {"pagina": "4150. Desenvolver as competências dos colaboradores e dos gestores", "questao": "4152. Há ações de desenvolvimento de liderança para os colaboradores que assumem funções gerenciais", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Oferecimento sistemático de cursos e treinamentos aos colaboradores que exercem funções de natureza gerencial, no bojo da Política de Educação Corporativa do TRT17 e demais regulamentos pertinentes. . ATO TRT 17.ª SGP/PRESI N.°24/2020, o qual dispõe sobre a política de educação corporativa para os servidores do TRT17; Resolução CNJ n.º 192/2014, que dispõe sobre a Política Nacional de Formação e Aperfeiçoamento de Servidores do Poder Judiciário, Resolução CSJT n.º 159/2015, que dispõe sobre a Política Nacional de Educação para Servidores da Justiça do Trabalho de primeiro e segundo graus, e Portaria Conjunta STF/CNJ/STJ/NJF/TST/CSJT/STM/TJ-DF n.º 3, de 31 de maio de 2007, que regulamenta dispositivos da Lei n.º 11.416/2006 (artigo 5.º do Anexo II).", "futuro": ""}, {"pagina": "4150. Desenvolver as competências dos colaboradores e dos gestores", "questao": "4153 A organização avalia as ações educacionais realizadas, com o objetivo de promover melhorias em ações educacionais futuras", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d", "obs": "SGP: De acordo com a Política de Educação Corporativa do TRT17, as ações de capacitação deverão ser avaliadas, sempre que viável, em quatro níveis: reação, aprendizagem, aplicação (impacto) e resultado (art. 13 do ATO TRT 17.ª SGP/PRESI N.°24/2020).", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4161. O ambiente de trabalho organizacional é avaliado", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e; f; g", "obs": "SGP: Realização de Pesquisa de Clima Organizacional - PCO, de periodicidade bienal, geralmente. A última pesquisa foi realizada em 2020, com vigência de seus efeitos para o biênio 20/21. A referida pesquisa contempla todos os itens listados ao lado.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4162. A organização oferece aos colaboradores condições mais flexíveis e estimulantes para realização de trabalho, com vistas ao aumento do desempenho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: Existência de grupos de trabalhos temporários para a execução de determinados Projetos e Ações; oportunidades de realização de trabalhos inovadores; a realização do teletrabalho em quase todas as unidades judiciárias e em alguns setores administrativos, além do trabalho remoto, posto em prática em decorrência da pandemia atual. Quanto aos itens “d” e “e”verifica-se o cumprimento na medida em que há ambientes fisicos adaptados aos colaboradores com deficiência (informação do SESA e DMPROJ) e publicações sistemáticas favorecendo a temática de respeito à diversidade. Ato TRT 17.ª SGP.PRESI n.º 42/2016, que Regulamenta o Teletrabalho no âmbito do TRT da 17.ª Região e Programa de Qualidade de Vida no Trabalho.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4163. Há programa(s) de qualidade de vida no trabalho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: O Programa de Qualidade de Vida no Trabalho deste Regional foi elaborado em consonância com Resolução 240 do Conselho Nacional de Justiça (CNJ), de 9 de setembro de 2016, a qual dispõe sobre a Política Nacional de Gestão de Pessoas no âmbito do Poder Judiciário. O referido programa contempla todos os itens listados ao lado.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4164. Há programa de reconhecimento de colaboradores e equipes", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d", "obs": "SGP: Programa de reconhecimento e incentivo à inovação, no âmbito do TRT da 17.ª Região, regulamentado pelo Ato PRESI SGP. 9/2019. O referido programa abrange todos os itens ao lado listados e teve seu primeiro ciclo aplicado no segundo semestre de 2020.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4165. Há procedimentos estruturados para identificar os motivos pessoais dos desligamentos voluntários da organização", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Formulário eletrônico enviado aos servidores egressos voluntariamente. Ação prevista na Resolução CSJT 229/2018, de observância obrigatória por este TRT17.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4166. Há procedimentos estruturados para identificar os motivos dos pedidos de movimentação interna dos colaboradores da organização", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c", "obs": "SGP: Planilha de controle das movimentações internas. Formulário eletrônico enviado aos servidores que se deslocaram internamente e também aos gestores. Ação prevista na Resolução CSJT 229/2018, de observância obrigatória por este TRT17.", "futuro": ""}, {"pagina": "4170. Gerir o desempenho dos colaboradores e dos gestores", "questao": "4171. A organização estabelece metas de desempenho individuais e/ou de equipes vinculadas aos planos organizacionais", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: A Resolução Administrativa n.º 13/2021, que regulamenta a gestão de desempenho e o desenvolvimento na carreira dos servidores do TRT17, disciplina em seu art. 8º, inciso I, o que segue:\n\n“Art. 8º O planejamento das atividades a serem realizadas no ciclo avaliativo deverá ser acordado  entre  avaliador  e  avaliado,  nos  primeiros  30  (trinta)  dias  de  cada  período avaliativo, e deve contemplar:\nI - definição das atividades ou metas de responsabilidade do servidor, em consonância com as metas definidas para a Unidade e para o Tribunal no âmbito do planejamento institucional”.", "futuro": ""}, {"pagina": "4170. Gerir o desempenho dos colaboradores e dos gestores", "questao": "4172. A organização realiza, formalmente, avaliação de desempenho individual, com atribuição de nota ou conceito, tendo como critério de avaliação o alcance das metas previstas", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: Na RA nº 13/21 há previsão de critérios para a avaliação de desempenho, observados:\n \na) para o servidor em estágio probatório, os fatores previstos no art.  22 desta Resolução; b)  para  o  servidor  estável,  as  competências  estratégicas  previstas  no  art.  34  desta Resolução; c) para o ocupante de função ou cargo de natureza gerencial, também as competências táticas previstas no art. 36 desta Resolução; e d) para o ocupante de cargo de natureza gerencial da alta Administração, também as competências táticas previstas no art. 37 desta Resolução. Percebe-se, então, que a avaliação de desempenho abrange todos os sujeitos da presente questão.", "futuro": ""}, {"pagina": "4170. Gerir o desempenho dos colaboradores e dos gestores", "questao": "4173. Os avaliadores informam aos colaboradores avaliados, antes do ciclo avaliativo, os critérios que serão utilizados para a avaliação de desempenho", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Na RA nº 13/21 há previsão de critérios para a avaliação de desempenho, observados:\n \na) para o servidor em estágio probatório, os fatores previstos no art.  22 desta Resolução; b)  para  o  servidor  estável,  as  competências  estratégicas  previstas  no  art.  34  desta Resolução; c) para o ocupante de função ou cargo de natureza gerencial, também as competências táticas previstas no art. 36 desta Resolução; e d) para o ocupante de cargo de natureza gerencial da alta Administração, também as competências táticas previstas no art. 37 desta Resolução. Percebe-se, então, que a avaliação de desempenho abrange todos os sujeitos da presente questão.", "futuro": ""}, {"pagina": "4170. Gerir o desempenho dos colaboradores e dos gestores", "questao": "4174. Os avaliadores realizam, antes da atribuição da nota ou conceito, pelo menos um encontro com colaborador avaliado com o objetivo de discutir o desempenho do avaliado", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Na RA nº 13/21 há previsão para tanto (art. 10, §§ 2º e 3º).", "futuro": ""}, {"pagina": "4170. Gerir o desempenho dos colaboradores e dos gestores", "questao": "4175. Os avaliadores identificam e documentam as necessidades individuais de capacitação durante o processo de avaliação de desempenho dos seus subordinados", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Utilização de campo específico no formulário de avaliação de desempenho. Essa informação serve de subsídio para a realização das ações de capacitação. O item de avaliação está formalizado em norma? SIM. RA nº 13/21 (art. 3º).", "futuro": ""}], "2024": [{"pagina": "4110. Realizar planejamento da gestão de pessoas", "questao": "4111. Definiram-se objetivos, indicadores e metas de desempenho para cada função (subsistema) de gestão de pessoas", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: O Planejamento Estratégico de Gestão de Pessoas - PEGP 2018-2020 preve objetivos, indicadores e metas contemplando todos os subsistemas listados ao lado. Atualmente, estamos na fase de elaboração do novo PEGP 2021-2026, o qual manterá sua essência, com as devidas atualizações para promover o alinhamento com as instâncias superiores.", "futuro": ""}, {"pagina": "4110. Realizar planejamento da gestão de pessoas", "questao": "4112. Há plano(s) específico(s) para orientar a gestão de pessoas na organização", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e; f", "obs": "SGP: O Planejamento Estratégico de Gestão de Pessoas - PEGP 2022-2026 preve objetivos, indicadores e metas contemplando todos os subsistemas listados ao lado.", "futuro": ""}, {"pagina": "4110. Realizar planejamento da gestão de pessoas", "questao": "4113. A organização verifica se os gestores cumprem as políticas de gestão de pessoas", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP:  a)Na ocasião da abertura de processos seletivos de remoção interna (RA 14/2015), são observadas as diretrizes para lotação e movimentação de servidores nas unidades judiciárias e administrativas.\n\nb) A verificação do cumprimento da política de capacitação, no que diz respeito à necessidade de participação de programas de desenvolvimento gerencial, é aferida via índice de gestores que participaram do programa de desenvolvimento gerencial (PEGP 2022 – 2026).\n\nc) A verificação do cumprimento da política de gestão de desempenho é mensurada via relatório consolidado acerca da avaliação dos resultados obtidos nos planos de desenvolvimento gerencial e individual dos servidores e do relatório com a análise das necessidades individuais de capacitação, durante o processo de avaliação de desempenho de servidores. A necessidade de criação desses relatórios advém da Resolução CSJT n.º 229/2018.\n\nd) A verificação do cumprimento da política de gestão de benefícios é apurada com base no seguinte indicador do objetivo estratégico 6 do PEGP 22-26: “índice de tratamento de inconsistências na gestão de benefícios”. \n\ne) O Programa de qualidade de vida no trabalho vigente neste Regional prevê a edicão de relatório consolidado acerca da avaliação dos resultados obtidos ao final de cada ciclo anual.", "futuro": "SGP: A maior parte das remoções internas ocorre sem a abertura de um processo seletivo de remoção interna formal. No momento, esta Secretaria não vislumbra oportunidade de melhoria para contornar tal fato."}, {"pagina": "4120. Definir, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores", "questao": "4121. Os perfis profissionais desejados para cada ocupação ou grupo de ocupações de gestão estão definidos e documentados", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e; f", "obs": "SGP: Realização do mapeamento das competências dos cargos e funções de natureza gerencial, avaliação das competências de seus ocupantes, elaboração de Planos de Desenvolvimento Individual (PDI) e de Programa de Desenvolvimento Gerencial (PDG).  Resolução CSJT n.º 92/2012, que instituiu o Modelo de Gestão de Pessoas por Competências; e Resolução CSJT n.º 156/2015, que dispõe sobre a Continuidade da Implantação do Modelo de Gestão de Pessoas por Competências no âmbito da Justiça do Trabalho de 1.º e 2.º Graus. Ademais, processo administrativo 961-38.2016.5.17.0500.", "futuro": ""}, {"pagina": "4120. Definir, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores", "questao": "4122. Os perfis profissionais desejados para cada ocupação ou grupo de ocupações de colaboradores da organização estão definidos e documentados", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e; f", "obs": "SGP: Realização do mapeamento das competências dos cargos e funções de natureza gerencial, avaliação das competências de seus ocupantes, elaboração de Planos de Desenvolvimento Individual (PDI) e de Programa de Desenvolvimento Gerencial (PDG). Resolução CSJT n.º 92/2012, que instituiu o Modelo de Gestão de Pessoas por Competências; e Resolução CSJT n.º 156/2015, que dispõe sobre a Continuidade da Implantação do Modelo de Gestão de Pessoas por Competências no âmbito da Justiça do Trabalho de 1.º e 2.º Graus. Ademais, processo administrativo 961-38.2016.5.17.0500.", "futuro": "SGP: Pretende-se alcançar o cumprimento dos itens listados ao lado com a completa implementação do Projeto de Gestão de Pessoas por Competências. Considerando que o projeto está em curso, ainda não foi possível realizar as etapas de revisão, caracterizadas pelos itens \"b\" e \"d\"."}, {"pagina": "4120. Definir, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores", "questao": "4123. Há definição do quantitativo necessário de pessoal por unidade organizacional ou por processo de trabalho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; e", "obs": "SGP: Realização de estudos multifacetados (movimentação de pessoal, recursos, demandas internas), visando apurar o quantitativo de pessoal necessário para a área finalística e de Tecnologia da Informação.  Resolução CSTJ n.º 296/2021, que dispoõe sobre a padronização da estrutura organizacional e de pessoal e sobre a distribuição da força de trabalho na JT; Resolução CNJ n.º 194/2014, que instituiu a Política Nacional de Atenção Prioritária ao Primeiro Grau de Jurisdição; Resolução CNJ n.º 219/2016, que dispõe sobre a Distribuição de Servidores, de Cargos em Comissão e Funções de Confiança nos Órgãos do Poder Judiciário de Primeiro e Segundo Graus; Resolução CNJ n.º 211/2015 e alterações posteriores, que instituiu a Estratégia Nacional de Tecnologia da Informação e Comunicação do Poder Judiciário (ENTIC-JUD), e  Resolução Administrativa 95/2022 e alterações posteriores, a qual fixa a estrutura organizacional das unidades de apoio direto e indireto à atividade judicante do Tribunal Regional do Trabalho da 17.ª Região", "futuro": ""}, {"pagina": "4120. Definir, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores", "questao": "4124. Monitora-se um conjunto de indicadores relevantes sobre força de trabalho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: O sistema de gestão de pessoas – SIGEP permite a extração de relatórios gerenciais abordando a maioria dos itens ao lado decliandos. Ademais, o portal da SGP dispõe de área dedicada à disponibilização de indicadores relevantes sobre a força de trabalho: https://trtesjusbr.sharepoint.com/sites/boas-vindas/SitePages/governanca.aspx", "futuro": ""}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4131. A escolha dos gestores ocorre segundo perfis profissionais previamente definidos e documentados", "resposta": "Adota parcialmente", "atende": "a; b; c; d", "obs": "SGP: Item \"a\": Resolução CNJ n.º 156/2012, a qual proíbe a designação de função de confiança ou a nomeação para cargo em comissão de pessoa que tenha praticado os atos que especifica, tipificados como causa de inelegibilidade prevista na legislação eleitoral, e dá outras providências. Para os itens \"b\" e \"c\", há matrizes de competência e criticidade para os postos de trabalho do TRT-17 e esses documentos servem para a seleção de gestores. Para o item “d”, tenciosa-se utilizar o Banco de Talentos como ferramenta auxiliadora. Muito embora o ATO PRESI/SGP 21/2019 tenha sido aprovado, a ferramenta ainda não foi posta em prática por falta de disponibilização e treinamento no módulo PROGECOM, sistema satélite ao SIGEP, de caráter nacional.", "futuro": "SGP: Pretende-se alcançar o cumprimento dos itens listados ao lado com a completa implementação do Projeto de Gestão de Pessoas por Competências e com a operacionalização do Banco de Talentos."}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4132. Os métodos e critérios das seleções externas (p.ex. dos concursos públicos; colaboradores requisitados em seleções externas) são definidos com base nos perfis profissionais desejados definidos na prática “4120. Definir adequadamente, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores”", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Os editais para concursos de servidores e estagiários levam em consideração os perfis profissionais desejados para a eleição das matérias cobradas. Resolução CSJT n.º 63/2010, Resolução CNJ n.º 219/2016, Resolução CNJ n.º 211/2015  e CSJT n.º 296/2021. Resoluções Administrativas números 13, 129 e 142, todas de 2012, e alterações, posteriormente revogada pela Resolução Administrativa n.º 001/2018 e Atos TRT 17.ª PRESI n.ºs 31/2008 e 07/2009, referendados pela Resolução Administrativa n.º 31/2010.", "futuro": ""}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4133. O número de vagas solicitadas para serem preenchidas nas seleções externas é estabelecido a partir do quantitativo necessário de pessoal por unidade organizacional ou por processo de trabalho, atualizado conforme a prática “4120. Definir adequadamente, em termos qualitativos e quantitativos, a demanda por colaboradores e gestores”", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Controle de quadro de lotação, tabela de lotação autorizada, lotação paradigma, lotacionograma, claros de lotação, entre outros controles pertinentes. Resolução CSJT n.º 63/2010, Resolução CNJ n.º 219/2016, Resolução CNJ n.º 211/2015 e CSJT n.º 296/2021. Resoluções Administrativas números 13, 129 e 142, todas de 2012, e alterações, posteriormente revogada pela Resolução Administrativa n.º 001/2018 e Atos TRT 17.ª SEREH/PRESI n.ºs 31/2008 e 07/2009, e também Resolução Administrativa n.º 31/2010.", "futuro": ""}, {"pagina": "4130. Assegurar o provimento das vagas existentes", "questao": "4134. A organização aloca os colaboradores com base na comparação entre os perfis profissionais apresentados por eles e os perfis profissionais desejados (documentados) pelas unidades organizacionais", "resposta": "Adota parcialmente", "atende": "a; b; c", "obs": "SGP: Via de regra, sempre quando há nomeação de novo servidor, a área de gestão de pessoas realiza análise curricular desse servidor e coteja as informações colhidas com as necessidades de pessoal das unidades organizacionais. Em se tratando de movimentações internas, a área de gestão de pessoas, quando instada, analisa o perfil dos colaboradores e as necessidades organizacionais, utilizando, inclusive, as matrizes de competências dos postos de trabalho. O banco de talentos, quando em operação, funcionará como mecanismo de transparência ativa, tal qual retradado no item “d”. ATO PRESI/SGP 21/2019 e RA 14/2015.", "futuro": "SGP: Estima-se que com a conclusão do Projeto de Gestão de Pessoas por Competências e a operacionalização do Banco de Talentos, este Regional possa atender de forma sistemática os itens listados ao lado."}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4141. Há uma política, ou programa, de sucessão", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: A Política de sucessão está em vigor no âmbito do TRT17 e é regulamentada pelo Ato SGP/PRESI nº 12/2020. No bojo deste projeto também é desenvolvido o mapeamento da criticidade de todos os postos do trabalho do TRT17. O andamento do projeto pode ser consultado no Processo 0000039-55.2020.5.17.0500.", "futuro": ""}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4142. As ocupações críticas da organização estão identificadas", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: A Política de sucessão está em vigor no âmbito do TRT17 e é regulamentada pelo Ato SGP/PRESI nº 12/2020. No bojo deste projeto também é desenvolvido o mapeamento da criticidade de todos os postos do trabalho do TRT17. Como não alcançamos a integralidade dos postos, recomenda-se a marcação “adota parcialmente”. O andamento do projeto pode ser consultado no Processo 0000039-55.2020.5.17.0500.", "futuro": "SGP: Estima-se que até o final do segundo semestre de 2024 a matriz de criticidade de todos os postos de trabalho do TRT17 esteja concluída."}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4143. Há plano de sucessão para as ocupações críticas", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: A Política de sucessão está em vigor no âmbito do TRT17 e é regulamentada pelo Ato SGP/PRESI nº 12/2020. No bojo deste projeto também é desenvolvido o mapeamento da criticidade de todos os postos do trabalho do TRT17. O andamento do projeto pode ser consultado no Processo 0000039-55.2020.5.17.0500.", "futuro": ""}, {"pagina": "4140. Assegurar a disponibilidade de sucessores qualificados", "questao": "4144. A organização executa ações educacionais para assegurar a disponibilidade de sucessores qualificados para as ocupações críticas", "resposta": "Adota parcialmente", "atende": "a; b; c", "obs": "SGP: item “a”: por força do Ato PRESI/SGP n.º 12/2020, é responsabilidade do ocupante de posto de trabalho considerado crítico, indicar servidor para sucedê-lo em seus impedimentos legais ou vacâncias (art. 7º). Item “b”: Com a maturidade da Política de Sucessão, a Secretaria de Gestão de Pessoas irá aplicar ao sucessor indicado o mesmo procedimento avaliativo de gestão por competências utilizado para o ocupante do posto crítico, de modo a identificar as lacunas de competências do sucessor e inseri-lo no programa de capacitação decorrente do modelo (art. 9º). Item “c”: tal qual ocorre para as demais ações educacionais, há avaliação de reação, aprendizado e resultado (quando aplicável) para as ações educacionais voltadas aos sucessores.", "futuro": "SGP: Almeja-se promover o cumprimento de maneira completa a todos os itens listados ao lado com o desenvolvimento das trilhas de capacitação para ocupações críticas."}, {"pagina": "4150. Desenvolver as competências dos colaboradores e dos gestores", "questao": "4151. As lacunas de competências dos colaboradores e gestores da organização são identificadas e documentadas", "resposta": "", "atende": "", "obs": "", "futuro": ""}, {"pagina": "4150. Desenvolver as competências dos colaboradores e dos gestores", "questao": "4152. Há ações de desenvolvimento de liderança para os colaboradores que assumem funções gerenciais", "resposta": "Adota em maior parte ou totalmente", "atende": "", "obs": "SGP: Oferecimento sistemático de cursos e treinamentos aos colaboradores que exercem funções de natureza gerencial, no bojo da Política de Educação Corporativa do TRT17 e demais regulamentos pertinentes. . ATO TRT 17.ª SGP/PRESI N.°24/2020, o qual dispõe sobre a política de educação corporativa para os servidores do TRT17; Resolução CNJ n.º 192/2014, que dispõe sobre a Política Nacional de Formação e Aperfeiçoamento de Servidores do Poder Judiciário, Resolução CSJT n.º 159/2015, que dispõe sobre a Política Nacional de Educação para Servidores da Justiça do Trabalho de primeiro e segundo graus, e Portaria Conjunta STF/CNJ/STJ/NJF/TST/CSJT/STM/TJ-DF n.º 3, de 31 de maio de 2007, que regulamenta dispositivos da Lei n.º 11.416/2006 (artigo 5.º do Anexo II).", "futuro": ""}, {"pagina": "4150. Desenvolver as competências dos colaboradores e dos gestores", "questao": "4153 A organização avalia as ações educacionais realizadas, com o objetivo de promover melhorias em ações educacionais futuras", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d", "obs": "SGP: De acordo com a Política de Educação Corporativa do TRT17, as ações de capacitação deverão ser avaliadas, sempre que viável, em quatro níveis: reação, aprendizagem, aplicação (impacto) e resultado (art. 13 do ATO TRT 17.ª SGP/PRESI N.°24/2020).", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4161. O ambiente de trabalho organizacional é avaliado", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e; f; g", "obs": "SGP: Realização de Pesquisa de Clima Organizacional - PCO, de periodicidade bienal, geralmente. A última pesquisa foi realizada em 2020, com vigência de seus efeitos para o biênio 20/21. A referida pesquisa contempla todos os itens listados ao lado. A SEGEST e SEGEP já se manifestaram positivamente, no bojo do processo 0001332-94.2019.5.17.0500, quanto à realização de novo ciclo, em breve.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4162. A organização oferece aos colaboradores condições mais flexíveis e estimulantes para realização de trabalho, com vistas ao aumento do desempenho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: Existência de colegiados temáticos para a execução de determinados Projetos e Ações; oportunidades de realização de trabalhos inovadores; a realização do teletrabalho, nos termos do Ato SGP/PRESI n.º 42/2016. Quanto aos itens “d” e “e”verifica-se o cumprimento na medida em que há ambientes fisicos adaptados aos colaboradores com deficiência e publicações sistemáticas favorecendo a temática de respeito à diversidade. Programa de Qualidade de Vida no Trabalho.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4163. Há programa(s) de qualidade de vida no trabalho", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d; e", "obs": "SGP: O Programa de Qualidade de Vida no Trabalho deste Regional foi elaborado em consonância com Resolução 240 do Conselho Nacional de Justiça (CNJ), de 9 de setembro de 2016, a qual dispõe sobre a Política Nacional de Gestão de Pessoas no âmbito do Poder Judiciário. O referido programa contempla todos os itens listados ao lado. Ao fim de cada ciclo anual, a SGP publica Relatório de Resultados sobre o PQVT.", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4164. Há programa de reconhecimento de colaboradores e equipes", "resposta": "Adota em maior parte ou totalmente", "atende": "a; b; c; d", "obs": "SGP: Programa Pontos de Estímulo", "futuro": ""}, {"pagina": "4160. Desenvolver e manter ambiente de trabalho positivo para o desempenho", "questao": "4165. Há procedimentos estruturados para identificar os motivos pessoais dos desligamentos voluntários da organização", "resposta": "Adota em maior par (function(){

    ${fracos.map(f=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:600"><span>${f.t}</span><span>${P(f.v)} <span style="color:var(--cinza);font-weight:400">(2021: ${P(f.v21)})</span></span></div><div style="height:11px;background:#f0f3f5;border-radius:3px;margin-top:3px"><div style="height:11px;width:${f.v}%;background:${faixaCor(f.v)};border-radius:3px"></div></div></div>`).join('')}
   </div>
   <div class="card"><h2>Itens de pessoas não plenamente adotados (2024) e planos declarados</h2>
    <p class="desc">Questões onde o TRT-17 respondeu abaixo de "adota em maior parte ou totalmente" — pontos concretos de melhoria com as iniciativas futuras registradas.</p>
    <table><thead><tr><th>Questão</th><th>Resposta</th><th>Iniciativa futura declarada</th></tr></thead><tbody>${rows||'<tr><td colspan=3>Todos os itens plenamente adotados.</td></tr>'}</tbody></table>
   </div>`;
})();

if(document.getElementById("f2013"))document.getElementById("f2013").innerHTML=barlistFatores(DATA.fatores2013);
['2017','2018'].forEach(function(y){
  var div=document.createElement('div');div.className='card';
  div.innerHTML='<h2>'+y+' em detalhe — 7 componentes (questionário integrado)</h2>'
   +'<p class="desc">Componentes da dimensão de pessoas no questionário integrado do TCU (códigos 4110–4170). Escala: Inexpressivo/Inicial 0–40%, Intermediário 40–70%, Aprimorado 70%+.</p>'
   +'<div class="fdet"></div>';
  document.getElementById('t-componentes').appendChild(div);
  div.querySelector('.fdet').innerHTML=barlistFatores(DATA.componentes.filter(function(c){return c.v[y]!=null;}).map(function(c){return [c.tema,c.v[y],faixaNome(c.v[y])];}));
});
// tooltips global
document.addEventListener('mouseover',e=>{const t=e.target.getAttribute&&e.target.getAttribute('data-tip');if(t)tip(e,t);});
document.addEventListener('mousemove',e=>{if(tt.style.opacity==1){tt.style.left=Math.min(e.clientX+12,innerWidth-250)+'px';tt.style.top=(e.clientY-10)+'px';}});
document.addEventListener('mouseout',e=>{if(e.target.getAttribute&&e.target.getAttribute('data-tip'))untip();});

</script>
