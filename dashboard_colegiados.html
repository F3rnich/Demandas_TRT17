  syncStatus: 'connecting', // connecting | synced | saving | error
  dirty: false,             // mudanças locais não salvas
  lastSaved: null,          // ISO string do último save
  remoteWhileDirty: null,   // snapshot remoto recebido enquanto dirty=true
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function lc(n){return n===0?'#94a3b8':n<=3?'#22c55e':n<=7?'#f59e0b':n<=12?'#f97316':'#ef4444';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){try{return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return '';}}
function computeLoads(){
  const l={};STAFF.forEach(s=>{l[s.id]={uae:[],part:[]};});
  S.cols.forEach(c=>{if(c.uaeId&&l[c.uaeId])l[c.uaeId].uae.push(c.nome);});
  PART.forEach(p=>{if(l[p.s])l[p.s].part.push({t:p.t,c:p.c});});
  return l;
}
function tot(id,ld){return(ld[id]?.uae.length||0)+(ld[id]?.part.length||0);}
function pillS(n){const c=n>0?lc(n):'#F1F5F9';const tx=n>0?'white':'#94a3b8';return`background:${c};color:${tx};border-radius:10px;padding:1px 8px;font-size:12px;font-weight:700;display:inline-block;`;}

let _toastTimer=null;
function toast(msg,bg,ms=3500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=bg||NAV;el.style.color='white';
  el.style.opacity='1';clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.style.opacity='0';},ms);
}

// ── FIRESTORE ─────────────────────────────────────────────────────────────────
function applyRemoteData(data){
  S.cols      = data.cols;
  S.lastSaved = data.savedAt?.toDate?.()?.toISOString() || null;
  S.dirty     = false;
  S.remoteWhileDirty = null;
  S.syncStatus = 'synced';
}

// Listener em tempo real
onSnapshot(STATE_DOC,
  (snap) => {
    if(!snap.exists()){
      // Documento ainda não existe no Firestore — usa defaults
      S.syncStatus = 'synced';
      render(); return;
    }
    const data = snap.data();
    if(!data.cols){S.syncStatus='synced';render();return;}

    if(S.dirty){
      // Há edições locais não salvas — não sobrescreve, mas avisa
      S.remoteWhileDirty = data;
      toast('⚠ Outra versão foi salva remotamente. Salve suas edições ou clique "↓ Sincronizar" para descartar.','#F59E0B',8000);
    } else {
      applyRemoteData(data);
    }
    render();
  },
  (err) => {
    console.error(err);
    S.syncStatus = 'error';
    toast('Erro de conexão com o banco de dados.','#EF4444');
    render();
  }
);

async function fsSave(){
  S.syncStatus='saving'; render();
  try{
    await setDoc(STATE_DOC,{cols:S.cols, savedAt:serverTimestamp()});
    S.dirty=false; S.remoteWhileDirty=null;
    S.syncStatus='synced'; S.lastSaved=new Date().toISOString();
    toast('Salvo ✓','#22C55E');
  }catch(e){
    S.syncStatus='error';
    toast('Erro ao salvar: '+e.message,'#EF4444');
  }
  render();
}

function fsSync(){
  if(S.remoteWhileDirty){
    if(S.dirty && !confirm('Descartar suas edições locais e carregar a versão mais recente?'))return;
    applyRemoteData(S.remoteWhileDirty);
    render();
    toast('Sincronizado.','#3B82F6');
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const ld=computeLoads();
  const sorted=[...STAFF].sort((a,b)=>tot(b.id,ld)-tot(a.id,ld));
  const selS=S.sel?STAFF.find(s=>s.id===S.sel):null;

  // Sync indicator
  const syncUI={
    connecting: {dot:'<span class="spin">⟳</span>', label:'conectando…',    color:'rgba(255,255,255,0.5)'},
    synced:     {dot:'●',                            label: S.lastSaved?'salvo '+fmtDate(S.lastSaved):'sincronizado', color:'#86EFAC'},
    saving:     {dot:'<span class="spin">⟳</span>', label:'salvando…',      color:'#FDE68A'},
    error:      {dot:'●',                            label:'erro de conexão', color:'#FCA5A5'},
  }[S.syncStatus]||{dot:'',label:'',color:'white'};

  const dirtyBanner = S.dirty
    ? `<div style="background:#FEF9C3;border-bottom:1px solid #FDE68A;padding:6px 18px;font-size:12px;color:#92400E;display:flex;align-items:center;gap:10px;">
         <span>✏ Edições não salvas</span>
         ${S.remoteWhileDirty?`<span style="font-weight:700;">· versão remota mais recente disponível</span>
           <button onclick="window._fsSync()" style="background:#F59E0B;color:white;border:none;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;">↓ Sincronizar</button>`:''}
       </div>`
    : '';

  const tabBtns=['Alocação UAE','Mapa de Participações','Dashboard de Carga'].map((lbl,i)=>`
    <button onclick="window._setTab(${i})" style="background:${S.tab===i?'white':'transparent'};color:${S.tab===i?NAV:'rgba(255,255,255,0.7)'};border:none;border-radius:6px 6px 0 0;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:${S.tab===i?700:500};">${lbl}</button>
  `).join('');

  let body='';
  if(S.tab===0)body=tab0(ld,sorted,selS);
  if(S.tab===1)body=tab1(ld,sorted);
  if(S.tab===2)body=tab2(ld,sorted);

  document.getElementById('root').innerHTML=`
    <div style="font-family:system-ui,-apple-system,sans-serif;background:#F1F5F9;min-height:100vh;">
      <div style="background:${NAV};">
        <div style="padding:14px 18px 0;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
            <div>
              <div style="color:rgba(255,255,255,0.5);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;">TRT-17 · Secretaria de Gestão de Pessoas</div>
              <div style="color:white;font-size:16px;font-weight:700;">Mapa de Alocação — Colegiados Temáticos</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap;justify-content:flex-end;">
              <span style="font-size:11px;color:${syncUI.color};display:flex;align-items:center;gap:4px;">${syncUI.dot} ${syncUI.label}</span>
              <button onclick="window._fsSave()" style="background:#22C55E;color:white;border:none;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:700;">↑ Salvar</button>
              <button onclick="window._doReset()" style="background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.25);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;">↺ Resetar</button>
            </div>
          </div>
          <div style="display:flex;gap:2px;">${tabBtns}</div>
        </div>
      </div>
      ${dirtyBanner}
      <div style="padding:14px;">${body}</div>
    </div>`;

  // Listeners tab 0
  if(S.tab===0){
    document.querySelectorAll('.staff-card').forEach(el=>{
      el.addEventListener('click',()=>{const id=el.dataset.id;S.sel=S.sel===id?null:id;render();});
    });
    const inp=document.getElementById('sinp');
    if(inp)inp.addEventListener('input',e=>{S.search=e.target.value;render();});
    document.querySelectorAll('.abtn').forEach(el=>{
      el.addEventListener('click',()=>{
        if(!S.sel)return;
        S.cols=S.cols.map(c=>c.id===el.dataset.cid?{...c,uaeId:S.sel}:c);
        S.sel=null;S.dirty=true;render();
      });
    });
    document.querySelectorAll('.usel').forEach(el=>{
      el.addEventListener('change',e=>{
        S.cols=S.cols.map(c=>c.id===el.dataset.cid?{...c,uaeId:e.target.value||null}:c);
        S.dirty=true;render();
      });
    });

    // Drag-and-drop: arrastar servidor (esq.) e soltar sobre colegiado (dir.)
    document.querySelectorAll('.staff-card').forEach(el=>{
      el.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('text/plain',el.dataset.id);
        e.dataTransfer.effectAllowed='move';
        el.classList.add('dragging');
      });
      el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    });
    document.querySelectorAll('.uae-card').forEach(el=>{
      el.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; el.classList.add('drag-over'); });
      el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
      el.addEventListener('drop',e=>{
        e.preventDefault();
        const sid=e.dataTransfer.getData('text/plain');
        const cid=el.dataset.cid;
        if(!sid||!cid)return;
        S.cols=S.cols.map(c=>c.id===cid?{...c,uaeId:sid}:c);
        S.sel=null;S.dirty=true;render();
      });
    });

    sizeScrolls();
  }
}

// Preenche a altura das colunas até o fim da viewport, evitando área branca sobrando
function sizeScrolls(){
  ['scrStaff','scrCols'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const top=el.getBoundingClientRect().top;
    el.style.height=Math.max(320,window.innerHeight-top-14)+'px';
  });
}
window.addEventListener('resize',()=>{ if(S.tab===0) sizeScrolls(); });

  const fil=q.length>1?sorted.filter(s=>s.nc.toLowerCase().includes(q)||s.unit.toLowerCase().includes(q)):sorted;

  const cards=fil.map(s=>{
    const t=tot(s.id,ld);const l=ld[s.id];const isSel=S.sel===s.id;
    const uN=l.uae.length,cN=l.part.filter(p=>p.t==='C').length,vcN=l.part.filter(p=>p.t==='VC').length,mN=l.part.filter(p=>p.t==='M').length;
    return`<div class="staff-card${isSel?' sel':''}" data-id="${s.id}" draggable="true">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="min-width:0;flex:1;">
          <div style="font-weight:600;font-size:12px;color:#1E293B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(s.nc)}</div>
          <div style="font-size:10px;color:#64748B;">${s.unit}</div>
        </div>
        <span style="${pillS(t)}margin-left:8px;flex-shrink:0;">${t||'—'}</span>
      </div>
      ${t>0?`<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px;">
        ${Array(uN).fill(0).map(()=>`<span style="background:#DBEAFE;color:#1E40AF;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;">UAE</span>`).join('')}
        ${Array(cN).fill(0).map(()=>`<span style="background:#FEF3C7;color:#92400E;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;">COORD</span>`).join('')}
        ${Array(vcN).fill(0).map(()=>`<span style="background:#F0FDF4;color:#166534;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;">V-COORD</span>`).join('')}
        ${Array(mN).fill(0).map(()=>`<span style="background:#F8FAFC;color:#64748B;border:1px solid #E2E8F0;border-radius:3px;padding:1px 5px;font-size:9px;">MBR</span>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');

  const colCards=S.cols.map(c=>{
    const uae=STAFF.find(s=>s.id===c.uaeId);
    const ut=c.uaeId?tot(c.uaeId,ld):0;const col=lc(ut);
    const right=S.sel
      ?`<button class="abtn" data-cid="${c.id}" style="background:#2563EB;color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">Atribuir ${selS?esc(selS.nc.split(' ')[0]):''}→</button>`
      :`<select class="usel" data-cid="${c.id}" style="font-size:11px;padding:3px 6px;border-radius:5px;border:1px solid #E2E8F0;color:#64748B;background:#F8FAFC;cursor:pointer;flex-shrink:0;">
         <option value="">— trocar —</option>
         ${STAFF.map(s=>`<option value="${s.id}"${c.uaeId===s.id?' selected':''}>${esc(s.nc)} (${tot(s.id,ld)})</option>`).join('')}
       </select>`;
    return`<div class="uae-card" data-cid="${c.id}" style="border:1.5px solid ${S.sel?'#BFDBFE':'#E2E8F0'};">
      <div style="margin-bottom:8px;">
        <span style="background:${NAV};color:white;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;margin-right:6px;">${c.sigla}</span>
        <span style="font-size:12px;font-weight:700;color:#1E293B;">${esc(c.nome)}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:#94A3B8;flex-shrink:0;">UAE atual:</span>
          ${uae?`<span style="background:${col}18;border:1.5px solid ${col};border-radius:16px;padding:3px 10px;font-size:11px;font-weight:700;color:#1E293B;display:flex;align-items:center;gap:6px;">${esc(uae.nc)}<span style="background:${col};color:white;border-radius:8px;padding:0 5px;font-size:10px;font-weight:700;">${ut}</span></span>`
               :`<span style="color:#EF4444;font-size:12px;font-style:italic;">não atribuído</span>`}
        </div>
        ${right}
      </div>
    </div>`;
  }).join('');

  const bb=S.sel?'#DBEAFE':'#F8FAFC';const bd=S.sel?'#93C5FD':'#E2E8F0';
  const bann=S.sel
    ?`<span style="color:#1E40AF;font-size:13px;font-weight:600;">✓ ${esc(selS?.nc)} — clique em "Atribuir" no colegiado desejado</span>
      <button onclick="window._clearSel()" style="background:none;border:none;cursor:pointer;color:#3B82F6;font-size:20px;line-height:1;padding:0;">×</button>`
    :`<span style="color:#64748B;font-size:12px;">💡 Clique em um servidor (esq.) → clique "Atribuir" no colegiado (dir.). Dropdown para atribuição direta.&ensp;<b style="color:#22c55e">●</b> 1–3&ensp;<b style="color:#f59e0b">●</b> 4–7&ensp;<b style="color:#f97316">●</b> 8–12&ensp;<b style="color:#ef4444">●</b> 13+</span>`;

  return`<div>
    <div style="background:${bb};border:1px solid ${bd};border-radius:8px;padding:8px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">${bann}</div>
    <div class="g2">
      <div>
        <div style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Elenco SGP · ${STAFF.length} servidores</div>
        <input id="sinp" placeholder="Filtrar nome ou unidade..." value="${esc(S.search)}" style="width:100%;padding:6px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;margin-bottom:8px;background:white;outline:none;"/>
        <div class="scr" id="scrStaff">${cards}</div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">UAE — ${S.cols.length} colegiados SGP</div>
        <div class="scr col-grid" id="scrCols">${colCards}</div>
      </div>
    </div>
  </div>`;
}

// ── TAB 1 ─────────────────────────────────────────────────────────────────────
function tab1(ld,sorted){
  const TC={M:{bg:'#F8FAFC',bd:'#E2E8F0',tx:'#475569'},C:{bg:'#FEF3C7',bd:'#FDE68A',tx:'#92400E'},VC:{bg:'#F0FDF4',bd:'#BBF7D0',tx:'#166534'}};
  const rows=sorted.map((s,i)=>{
    const t=tot(s.id,ld);const l=ld[s.id];const bg=i%2===0?'white':'#F8FAFC';
    const chips=[
      ...l.uae.map(u=>`<span class="badge" style="background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD;font-weight:700;">UAE — ${esc(u)}</span>`),
      ...l.part.map(p=>{const tc=TC[p.t]||TC.M;const px=p.t==='C'?'★ ':p.t==='VC'?'◆ ':'';return`<span class="badge" style="background:${tc.bg};color:${tc.tx};border:1px solid ${tc.bd};">${px}${esc(p.c)}</span>`;})
    ].join('');
    return`<tr>
      <td style="font-weight:600;color:#1E293B;white-space:nowrap;background:${bg}">${esc(s.nc)}</td>
      <td style="font-size:11px;color:#64748B;background:${bg}">${s.unit}</td>
      <td style="text-align:center;background:${bg}">${t>0?`<span style="${pillS(t)}">${t}</span>`:`<span style="color:#CBD5E1">—</span>`}</td>
      <td style="background:${bg}"><div style="display:flex;flex-wrap:wrap;gap:3px;">${chips||'<span style="color:#CBD5E1;font-size:11px;font-style:italic;">sem alocação</span>'}</div></td>
    </tr>`;
  }).join('');
  return`<div style="background:white;border-radius:8px;overflow:hidden;">
    <table><thead><tr>
      <th style="width:20%;white-space:nowrap;">Servidor</th><th style="width:7%;">Unidade</th>
      <th style="width:6%;text-align:center;">Carga</th><th>Alocações</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

// ── TAB 2 ─────────────────────────────────────────────────────────────────────
function tab2(ld,sorted){
  const data=sorted.filter(s=>tot(s.id,ld)>0).map(s=>({name:s.nc,uae:ld[s.id].uae.length,part:ld[s.id].part.length,total:tot(s.id,ld)}));
  const mx=Math.max(...data.map(d=>d.total),1);
  const barH=22,gap=10,lW=150,cW=460,svgH=data.length*(barH+gap)+20;
  const bars=data.map((d,i)=>{
    const y=i*(barH+gap)+10,uw=(d.uae/mx)*cW,pw=(d.part/mx)*cW;
    return`<g>
      <text x="${lW-6}" y="${y+barH/2+4}" text-anchor="end" font-size="11" fill="#475569">${esc(d.name)}</text>
      <rect x="${lW}" y="${y}" width="${Math.max(uw,0)}" height="${barH}" fill="#3B82F6" rx="2"/>
      <rect x="${lW+uw}" y="${y}" width="${Math.max(pw,0)}" height="${barH}" fill="#94A3B8" rx="2"/>
      <text x="${lW+uw+pw+5}" y="${y+barH/2+4}" font-size="12" font-weight="700" fill="#475569">${d.total}</text>
    </g>`;
  }).join('');
  const ct=tot('CLEIDE',ld);
  return`<div style="background:white;border-radius:8px;padding:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div style="font-size:14px;font-weight:700;color:#1E293B;">Carga total por servidor (UAE + participações)</div>
      <div style="display:flex;gap:16px;font-size:11px;color:#64748B;">
        <span><span style="display:inline-block;width:10px;height:10px;background:#3B82F6;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>UAE</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#94A3B8;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Membro/Coord.</span>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <svg width="${lW+cW+60}" height="${svgH}" style="display:block;">${bars}</svg>
    </div>
    <div style="margin-top:16px;padding:12px 14px;background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;">
      <div style="font-size:12px;color:#92400E;font-weight:700;margin-bottom:4px;">⚠ Atenção — Carga da Cleide Reisen (SGP)</div>
      <div style="font-size:11px;color:#78350F;">Com ${ct} alocações registradas, a Cleide concentra a maior carga da SGP em colegiados. Parte disso reflete mandatos institucionais, mas é um ponto de atenção para eventual redistribuição de UAE.</div>
    </div>
  </div>`;
}

// ── EXPÕE FUNÇÕES PARA ONCLICK INLINE ─────────────────────────────────────────
window._setTab  = (i)=>{ S.tab=i; S.sel=null; render(); };
window._fsSave  = fsSave;
window._fsSync  = fsSync;
window._clearSel= ()=>{ S.sel=null; render(); };
window._doReset = ()=>{
  if(!confirm('Resetar para os valores padrão? As edições não salvas serão perdidas.'))return;
  S.cols=JSON.parse(JSON.stringify(UAE_INIT));
  S.sel=null;S.search='';S.dirty=true;render();
  toast('Valores padrão restaurados. Clique "↑ Salvar" para persistir.','#64748B');
};

render();
</script>
